# Name of the GitHub Actions workflow
name: DevOps CI/CD Pipeline

# Controls when the workflow will run
on:
  push:
    branches: [ "main" ] # Triggers the workflow on push events to the main branch
  pull_request:
    branches: [ "main" ] # Triggers the workflow on pull requests to the main branch

jobs:
  build-and-deploy:
    # Run the job on a hosted Ubuntu runner
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout the source code from GitHub
    - name: Checkout Code
      uses: actions/checkout@v3

    # 2. Set up Java JDK 21
    - name: Set up JDK 21
      uses: actions/setup-java@v3
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven # Caches maven dependencies to speed up future runs

    # 3. Build and test the Spring Boot application using Maven
    # This ensures that your tests pass and code compiles correctly before building the Docker image.
    - name: Build and Test with Maven
      run: mvn clean package

    # 4. Log in to Docker Hub using secrets
    # Note: DOCKERHUB_USERNAME and DOCKERHUB_TOKEN must be added under 
    # Settings -> Secrets and variables -> Actions in your GitHub repository.
    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # 5. Build the Docker image using the Dockerfile and push it to Docker Hub
    - name: Build and Push Docker Image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/devops-ci-cd:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/devops-ci-cd:${{ github.sha }}
